<!DOCTYPE html>
<html>
<head>
    <title>Clear Service Workers</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Clear Service Workers</h1>
    <p>Click the button below to clear all service workers and caches:</p>
    
    <button onclick="clearServiceWorkers()">Clear Service Workers</button>
    <button onclick="clearCaches()">Clear Caches</button>
    <button onclick="reloadPage()">Reload Page</button>
    
    <div id="result"></div>
    
    <script>
        async function clearServiceWorkers() {
            if ('serviceWorker' in navigator) {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        console.log('Unregistered:', registration);
                    }
                    document.getElementById('result').innerHTML = 
                        `<p class="success">Unregistered ${registrations.length} service worker(s)</p>`;
                } catch (error) {
                    document.getElementById('result').innerHTML = 
                        `<p class="error">Error: ${error.message}</p>`;
                }
            } else {
                document.getElementById('result').innerHTML = 
                    '<p>Service Workers not supported</p>';
            }
        }
        
        async function clearCaches() {
            if ('caches' in window) {
                try {
                    const cacheNames = await caches.keys();
                    for (let cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        console.log('Deleted cache:', cacheName);
                    }
                    document.getElementById('result').innerHTML = 
                        `<p class="success">Deleted ${cacheNames.length} cache(s)</p>`;
                } catch (error) {
                    document.getElementById('result').innerHTML = 
                        `<p class="error">Error: ${error.message}</p>`;
                }
            } else {
                document.getElementById('result').innerHTML = 
                    '<p>Cache API not supported</p>';
            }
        }
        
        function reloadPage() {
            location.reload();
        }
        
        // Auto-run on page load
        window.addEventListener('load', () => {
            console.log('Clear Service Workers page loaded');
            console.log('Current service workers:');
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    console.log('Found', registrations.length, 'service workers');
                    registrations.forEach(reg => {
                        console.log(' -', reg.scope);
                    });
                });
            }
        });
    </script>
</body>
</html>
