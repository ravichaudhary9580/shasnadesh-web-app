<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shasnadesh - Offline</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #faf8f5;
            color: #26201a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            color: #e8920a;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #666;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 2rem;
        }
        button {
            background: #e8920a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #d48309;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📶</div>
        <h1>You're Offline</h1>
        <p>It looks like you're not connected to the internet. Please check your connection and try again.</p>
        <p>Some content may still be available if you've visited this page before.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
